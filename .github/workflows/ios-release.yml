name: iOS App Store Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.0)'
        required: false
        type: string

concurrency:
  group: ios-release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Upload to App Store
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios/Threshold

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios/Threshold

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          bundle exec fastlane run increment_version_number version_number:"$VERSION" xcodeproj:"Threshold.xcodeproj"

      - name: Set version from input
        if: github.event.inputs.version != ''
        run: |
          echo "Setting version to ${{ github.event.inputs.version }}"
          bundle exec fastlane run increment_version_number version_number:"${{ github.event.inputs.version }}" xcodeproj:"Threshold.xcodeproj"

      - name: Run Fastlane release lane
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane release

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Threshold-AppStore
          path: ios/Threshold/build/Threshold.ipa
          retention-days: 30
